{% extends "base.html" %}

{% block title %}My Medicines - Swastha Sathi{% endblock %}
{% block header_title %}Medicines Management{% endblock %}

{% block content %}
<div class="dashboard-content">
    <div class="section-header">
        <div>
            <h1>My Medicines</h1>
            <p>Track your prescriptions and reminders.</p>
        </div>
        <button class="add-btn" onclick="openMedicineModal()">
            <i data-lucide="plus"></i>
            <span>Add Medicine</span>
        </button>
    </div>
    <div id="medicines-list" class="grid">
        <p>Loading...</p>
    </div>
</div>

<!-- Medicine Modal -->
<div id="medicine-modal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h3 id="med-modal-title">Add Medicine</h3>
            <button class="close-modal" onclick="closeModal('medicine-modal')">&times;</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="med-id">
            <div class="form-group">
                <label>Medicine Name</label>
                <input type="text" id="med-name" class="form-control" placeholder="e.g., Paracetamol">
            </div>
            <div class="form-group">
                <label>Dosage</label>
                <input type="text" id="med-dosage" class="form-control" placeholder="e.g., 500mg">
            </div>
            <div class="form-group">
                <label>Frequency</label>
                <input type="text" id="med-frequency" class="form-control" placeholder="e.g., Twice a day">
            </div>
            <div class="form-group">
                <label>Timing</label>
                <input type="text" id="med-timing" class="form-control" placeholder="e.g., After meals">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('medicine-modal')">Cancel</button>
            <button class="btn btn-primary" onclick="saveMedicine()">Save Medicine</button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let medicinesStore = [];

    async function loadMedicines() {
        const list = document.getElementById('medicines-list');
        try {
            const resp = await fetch('/api/medicines');
            const data = await resp.json();
            medicinesStore = data.medicines;

            if (medicinesStore.length === 0) {
                list.innerHTML = '<div class="empty-state"><i data-lucide="pill"></i><p>No medicines found. Add some by clicking the button above!</p></div>';
                lucide.createIcons();
                return;
            }

            list.innerHTML = '';
            medicinesStore.forEach(med => {
                const card = document.createElement('div');
                card.className = 'data-card';
                card.innerHTML = `
                    <div class="card-title">${med.name}</div>
                    <div class="card-detail"><i data-lucide="activity" style="width:14px; display:inline; margin-right:4px"></i>Dosage: ${med.dosage}</div>
                    <div class="card-detail"><i data-lucide="clock" style="width:14px; display:inline; margin-right:4px"></i>${med.frequency} ${med.timing}</div>
                    <div class="card-actions">
                        <button class="action-btn" onclick="editMedicine(${med.id})" title="Edit">
                            <i data-lucide="edit-2" style="width:14px"></i>
                        </button>
                        <button class="action-btn delete" onclick="deleteMedicine(${med.id})" title="Delete">
                            <i data-lucide="trash-2" style="width:14px"></i>
                        </button>
                    </div>
                `;
                list.appendChild(card);
            });
            lucide.createIcons();
        } catch (e) {
            console.error(e);
            list.innerHTML = '<p>Error loading medicines. Please try again.</p>';
        }
    }

    function openMedicineModal() {
        document.getElementById('med-modal-title').innerText = 'Add Medicine';
        document.getElementById('med-id').value = '';
        document.getElementById('med-name').value = '';
        document.getElementById('med-dosage').value = '';
        document.getElementById('med-frequency').value = '';
        document.getElementById('med-timing').value = '';
        document.getElementById('medicine-modal').classList.add('active');
    }

    function editMedicine(id) {
        const med = medicinesStore.find(m => m.id === id);
        if (!med) return;

        document.getElementById('med-modal-title').innerText = 'Edit Medicine';
        document.getElementById('med-id').value = med.id;
        document.getElementById('med-name').value = med.name;
        document.getElementById('med-dosage').value = med.dosage;
        document.getElementById('med-frequency').value = med.frequency;
        document.getElementById('med-timing').value = med.timing;
        document.getElementById('medicine-modal').classList.add('active');
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('active');
    }

    async function saveMedicine() {
        const id = document.getElementById('med-id').value;
        const data = {
            name: document.getElementById('med-name').value,
            dosage: document.getElementById('med-dosage').value,
            frequency: document.getElementById('med-frequency').value,
            timing: document.getElementById('med-timing').value
        };

        const url = id ? `/api/medicines/${id}` : '/api/medicines';
        const method = id ? 'PUT' : 'POST';

        try {
            const resp = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (resp.ok) {
                closeModal('medicine-modal');
                loadMedicines();
            } else {
                alert('Failed to save medicine');
            }
        } catch (e) { alert('Error saving medicine'); }
    }

    async function deleteMedicine(id) {
        if (!confirm('Are you sure you want to delete this medicine?')) return;
        try {
            const resp = await fetch(`/api/medicines/${id}`, { method: 'DELETE' });
            if (resp.ok) {
                loadMedicines();
            }
        } catch (e) { alert('Error deleting medicine'); }
    }

    // Initial load
    document.addEventListener('DOMContentLoaded', loadMedicines);
</script>
{% endblock %}
