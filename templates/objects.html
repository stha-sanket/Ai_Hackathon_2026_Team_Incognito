{% extends "base.html" %}

{% block title %}Object Finder - Swastha Sathi{% endblock %}
{% block header_title %}Object Locator{% endblock %}

{% block content %}
<div class="dashboard-content">
    <div class="section-header">
        <div>
            <h1>Object Locator</h1>
            <p>Where did you leave your things?</p>
        </div>
        <button class="add-btn" onclick="openObjectModal()">
            <i data-lucide="plus"></i>
            <span>Add Object</span>
        </button>
    </div>
    <div id="objects-list" class="grid">
        <p>Loading...</p>
    </div>
</div>

<!-- Object Modal -->
<div id="object-modal" class="modal-overlay">
    <div class="modal-container">
        <div class="modal-header">
            <h3 id="obj-modal-title">Add Object</h3>
            <button class="close-modal" onclick="closeModal('object-modal')">&times;</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="obj-id">
            <div class="form-group">
                <label>Object Name</label>
                <input type="text" id="obj-name" class="form-control" placeholder="e.g., House keys">
            </div>
            <div class="form-group">
                <label>Location</label>
                <input type="text" id="obj-location" class="form-control" placeholder="e.g., Top shelf in kitchen">
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-secondary" onclick="closeModal('object-modal')">Cancel</button>
            <button class="btn btn-primary" onclick="saveObject()">Save Location</button>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let objectsStore = [];

    async function loadObjects() {
        const list = document.getElementById('objects-list');
        try {
            const resp = await fetch('/api/objects');
            const data = await resp.json();
            objectsStore = data.objects;

            if (objectsStore.length === 0) {
                list.innerHTML = '<div class="empty-state"><i data-lucide="search"></i><p>No objects recorded yet.</p></div>';
                lucide.createIcons();
                return;
            }

            list.innerHTML = '';
            objectsStore.forEach(obj => {
                const card = document.createElement('div');
                card.className = 'data-card';
                const ts = new Date(obj.timestamp).toLocaleString();
                card.innerHTML = `
                    <div class="card-title">${obj.object_name}</div>
                    <div class="card-detail"><i data-lucide="map-pin" style="width:14px; display:inline; margin-right:4px"></i>Location: ${obj.location}</div>
                    <div class="card-detail" style="font-size:0.75rem; margin-top:0.75rem; color: var(--text-light)">Recorded: ${ts}</div>
                    <div class="card-actions">
                        <button class="action-btn" onclick="editObject(${obj.id})" title="Edit">
                            <i data-lucide="edit-2" style="width:14px"></i>
                        </button>
                        <button class="action-btn delete" onclick="deleteObject(${obj.id})" title="Delete">
                            <i data-lucide="trash-2" style="width:14px"></i>
                        </button>
                    </div>
                `;
                list.appendChild(card);
            });
            lucide.createIcons();
        } catch (e) { list.innerHTML = '<p>Error loading objects.</p>'; }
    }

    function openObjectModal() {
        document.getElementById('obj-modal-title').innerText = 'Add Object';
        document.getElementById('obj-id').value = '';
        document.getElementById('obj-name').value = '';
        document.getElementById('obj-location').value = '';
        document.getElementById('object-modal').classList.add('active');
    }

    function editObject(id) {
        const obj = objectsStore.find(o => o.id === id);
        if (!obj) return;

        document.getElementById('obj-modal-title').innerText = 'Edit Location';
        document.getElementById('obj-id').value = obj.id;
        document.getElementById('obj-name').value = obj.object_name;
        document.getElementById('obj-location').value = obj.location;
        document.getElementById('object-modal').classList.add('active');
    }

    function closeModal(id) {
        document.getElementById(id).classList.remove('active');
    }

    async function saveObject() {
        const id = document.getElementById('obj-id').value;
        const data = {
            object: document.getElementById('obj-name').value,
            location: document.getElementById('obj-location').value
        };

        const url = id ? `/api/objects/${id}` : '/api/objects';
        const method = id ? 'PUT' : 'POST';

        try {
            const resp = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (resp.ok) {
                closeModal('object-modal');
                loadObjects();
            }
        } catch (e) { alert('Error saving object'); }
    }

    async function deleteObject(id) {
        if (!confirm('Are you sure you want to delete this record?')) return;
        try {
            const resp = await fetch(`/api/objects/${id}`, { method: 'DELETE' });
            if (resp.ok) {
                loadObjects();
            }
        } catch (e) { alert('Error deleting object'); }
    }

    // Initial load
    document.addEventListener('DOMContentLoaded', loadObjects);
</script>
{% endblock %}
